name: Auto Update

on:
  # push:
  #   branches:
  #     - main
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install uv dependencies
        working-directory: ./scraper
        run: |
          uv sync --no-dev
          chmod -R 777 .venv
        
        # sudo apt-get update
        # uv run seleniumbase install chromedriver
        # 给所有驱动添加执行权限
        # find .venv -name "uc_driver" -o -name "chromedriver" -o -name "*driver" -type f 2>/dev/null | while read -r driver; do
        #   chmod +x "$driver"
        #   echo "Fixed permissions for: $driver"
        # done

      - run: |
          sudo tee -a /etc/hosts <<EOF
          0.0.0.0 fonts.googleapis.com
          0.0.0.0 fonts.gstatic.com
          0.0.0.0 pagead2.googlesyndication.com
          0.0.0.0 static.cloudflareinsights.com
          0.0.0.0 googletagmanager.com
          0.0.0.0 www.googletagmanager.com
          EOF
      - name: Run Update Script
        working-directory: ./scraper
        run: uv run main.py
        # run: xvfb-run --server-args="-screen 0 1280x1024x24" uv run scraper\main.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update configs [skip ci]" || exit 0
          git push origin main || true

  checker:
    runs-on: ubuntu-latest
    needs: scraper
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bun dependencies
        working-directory: ./checker
        run: bun install

      - name: Build Bun Executable
        working-directory: ./checker
        run: bun build --compile --minify --sourcemap --bytecode index.ts --outfile ../index-bin
      
      - name: Bun Post-processing
        run: ./index-bin

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update configs [skip ci]" || exit 0
          git push origin main || true
